// ─── Challenge Generator ─────────────────────────────────────────────────────

function generateChallenges(lessons) {
  const allPhrases = lessons.flatMap((l) =>
    l.phrases
      .filter((p) => !p.pt.includes("→") && p.pt.length < 40)
      .map((p) => ({ ...p, lessonId: l.id, lessonTitle: l.title }))
  );

  const challengeTypes = [
    // Type 1: Match PT to EN
    (phrase) => {
      const wrongs = _.sampleSize(
        allPhrases.filter((p) => p.en !== phrase.en),
        3
      ).map((p) => p.en);
      const options = _.shuffle([phrase.en, ...wrongs]);
      return {
        type: "match",
        question: `What does "${phrase.pt}" mean?`,
        options,
        correct: phrase.en,
        hint: `Spanish: ${phrase.es}`,
        explanation: phrase.note,
      };
    },
    // Type 2: Match EN to PT
    (phrase) => {
      const wrongs = _.sampleSize(
        allPhrases.filter((p) => p.pt !== phrase.pt),
        3
      ).map((p) => p.pt);
      const options = _.shuffle([phrase.pt, ...wrongs]);
      return {
        type: "translate",
        question: `How do you say "${phrase.en}" in Portuguese?`,
        options,
        correct: phrase.pt,
        hint: `Spanish: ${phrase.es}`,
        explanation: phrase.note,
      };
    },
    // Type 3: Pronunciation
    (phrase) => {
      const wrongs = _.sampleSize(
        allPhrases.filter((p) => p.pronun !== phrase.pronun),
        3
      ).map((p) => p.pronun);
      const options = _.shuffle([phrase.pronun, ...wrongs]);
      return {
        type: "pronunciation",
        question: `How is "${phrase.pt}" pronounced?`,
        options,
        correct: phrase.pronun,
        hint: `English: ${phrase.en}`,
        explanation: phrase.note,
      };
    },
    // Type 4: Spanish connection
    (phrase) => {
      const wrongs = _.sampleSize(
        allPhrases.filter((p) => p.es !== phrase.es),
        3
      ).map((p) => p.es);
      const options = _.shuffle([phrase.es, ...wrongs]);
      return {
        type: "spanish",
        question: `"${phrase.pt}" in Portuguese — what's the Spanish equivalent?`,
        options,
        correct: phrase.es,
        hint: `English: ${phrase.en}`,
        explanation: phrase.note,
      };
    },
  ];

  const selected = _.sampleSize(allPhrases, 5);
  return selected.map((phrase) => {
    const typeFn = _.sample(challengeTypes);
    return typeFn(phrase);
  });
}

function PhraseCard({ phrase, index }) {
  const [showDetails, setShowDetails] = useState(false);

  return (
    <div
      onClick={() => setShowDetails(!showDetails)}
      style={{
        background: COLORS.card,
        borderRadius: 14,
        padding: "16px 20px",
        marginBottom: 10,
        cursor: "pointer",
        border: `1px solid ${COLORS.border}`,
        transition: "all 0.2s ease",
        boxShadow: showDetails ? "0 4px 16px rgba(0,0,0,0.08)" : "none",
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 18, fontWeight: 600, color: COLORS.primary, marginBottom: 2 }}>
            {phrase.pt}
          </div>
          <div style={{ fontSize: 14, color: COLORS.textLight }}>{phrase.en}</div>
        </div>
        <div
          style={{
            background: COLORS.primaryFaint,
            color: COLORS.primary,
            padding: "4px 10px",
            borderRadius: 20,
            fontSize: 13,
            fontWeight: 500,
            whiteSpace: "nowrap",
            marginLeft: 12,
          }}
        >
          {phrase.pronun}
        </div>
      </div>

      {showDetails && (
        <div style={{ marginTop: 14, paddingTop: 14, borderTop: `1px solid ${COLORS.border}` }}>
          <div
            style={{
              background: COLORS.spanishBg,
              borderRadius: 10,
              padding: "10px 14px",
              marginBottom: 10,
              display: "flex",
              alignItems: "center",
              gap: 8,
            }}
          >
            <span style={{ fontSize: 14 }}>🇪🇸</span>
            <span style={{ color: COLORS.spanish, fontSize: 14, fontWeight: 500 }}>
              {phrase.es}
            </span>
          </div>
          {phrase.note && (
            <div
              style={{
                background: COLORS.accentLight,
                borderRadius: 10,
                padding: "10px 14px",
                fontSize: 13,
                color: COLORS.text,
                lineHeight: 1.5,
              }}
            >
              💡 {phrase.note}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

          cursor: "pointer",
          padding: "8px 0",
          marginBottom: 12,
          fontWeight: 500,
          display: "flex",
          alignItems: "center",
          gap: 6,
        }}
      >
        ← Back to lessons
      </button>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 40, marginBottom: 4 }}>{lesson.icon}</div>
        <h2 style={{ margin: 0, color: COLORS.text, fontSize: 24 }}>{lesson.title}</h2>
        <p style={{ margin: "4px 0 0", color: COLORS.textLight, fontSize: 14 }}>
          {lesson.subtitle} · Tap any phrase to expand
        </p>
      </div>
      {lesson.phrases.map((phrase, i) => (
        <PhraseCard key={i} phrase={phrase} index={i} />
      ))}
    </div>
  );
}

function ChallengeView({ onBack }) {
  const [challenges, setChallenges] = useState(() => generateChallenges(LESSONS));
  const [currentIdx, setCurrentIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [score, setScore] = useState(0);
  const [showResult, setShowResult] = useState(false);
  const [streak, setStreak] = useState(0);

  const current = challenges[currentIdx];
  const isFinished = currentIdx >= challenges.length;

  const handleSelect = (option) => {
    if (selected !== null) return;
    setSelected(option);
    if (option === current.correct) {
      setScore((s) => s + 1);
      setStreak((s) => s + 1);
    } else {
      setStreak(0);
    }
    setShowResult(true);
  };

  const handleNext = () => {
    setSelected(null);
    setShowResult(false);
    setCurrentIdx((i) => i + 1);
  };

  const handleRestart = () => {
    setChallenges(generateChallenges(LESSONS));
    setCurrentIdx(0);
    setSelected(null);
    setScore(0);
    setShowResult(false);
    setStreak(0);
  };

  if (isFinished) {
    const percentage = Math.round((score / challenges.length) * 100);
    const message =
      percentage === 100
        ? "Perfeito! You nailed every single one! 🌟"
        : percentage >= 80
        ? "Muito bem! Really strong work! 💪"
        : percentage >= 60
        ? "Bom trabalho! You're getting the hang of it! 👏"
        : "Boa tentativa! Keep practising, you'll get there! 🌱";

    return (
      <div>
        <button
          onClick={onBack}
          style={{
            background: "none",
            border: "none",
            color: COLORS.primary,
            fontSize: 15,
            cursor: "pointer",
            padding: "8px 0",
            marginBottom: 12,
            fontWeight: 500,
          }}
        >
          ← Back
        </button>
        <div style={{ textAlign: "center", padding: "40px 20px" }}>
          <div style={{ fontSize: 60, marginBottom: 16 }}>
            {percentage === 100 ? "🏆" : percentage >= 60 ? "⭐" : "📚"}
          </div>
          <h2 style={{ color: COLORS.text, margin: "0 0 8px", fontSize: 28 }}>
            {score} / {challenges.length}
          </h2>
          <p style={{ color: COLORS.textLight, fontSize: 16, margin: "0 0 24px" }}>{message}</p>
          <button
            onClick={handleRestart}
            style={{
              background: COLORS.primary,
              color: "white",
              border: "none",
              borderRadius: 12,
              padding: "14px 32px",
              fontSize: 16,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            New Challenge Round 🔄
          </button>
        </div>
      </div>
    );
  }

  const typeLabel = {
    match: "🇵🇹 → 🇬🇧  Portuguese to English",
    translate: "🇬🇧 → 🇵🇹  English to Portuguese",
    pronunciation: "🗣️  Pronunciation Check",
    spanish: "🇪🇸 → 🇵🇹  Spanish Connection",
  };

  return (
    <div>
      <button
        onClick={onBack}
        style={{
          background: "none",
          border: "none",
          color: COLORS.primary,
          fontSize: 15,
          cursor: "pointer",
          padding: "8px 0",
          marginBottom: 16,
          fontWeight: 500,
        }}
      >
        ← Back
      </button>

      {/* Progress bar */}
      <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
        {challenges.map((_, i) => (
          <div
            key={i}
            style={{
              flex: 1,
              height: 6,
              borderRadius: 3,
              background:
                i < currentIdx
                  ? COLORS.primaryLight
                  : i === currentIdx
                  ? COLORS.primary
                  : COLORS.border,
              transition: "background 0.3s",
            }}
          />
        ))}
      </div>

      {/* Score and streak */}
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          marginBottom: 20,
          fontSize: 14,
          color: COLORS.textLight,
        }}
      >
        <span>
          Question {currentIdx + 1} of {challenges.length}
        </span>
        <div style={{ display: "flex", gap: 16 }}>
          <span>Score: {score}</span>
          {streak >= 2 && (
            <span style={{ color: COLORS.accent, fontWeight: 600 }}>🔥 {streak} streak!</span>
          )}
        </div>
      </div>

      {/* Challenge type badge */}
      <div
        style={{
          fontSize: 12,
          color: COLORS.textLight,
          textAlign: "center",
          marginBottom: 8,
          fontWeight: 500,
        }}
      >
        {typeLabel[current.type]}
      </div>

      {/* Question */}
      <div
        style={{
          background: COLORS.card,
          borderRadius: 16,
          padding: "24px 20px",
          textAlign: "center",
          marginBottom: 20,
          border: `1px solid ${COLORS.border}`,
          boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
        }}
      >
        <h3 style={{ margin: 0, color: COLORS.text, fontSize: 20, lineHeight: 1.4 }}>
          {current.question}
        </h3>
        {!showResult && (
          <p style={{ margin: "12px 0 0", color: COLORS.spanish, fontSize: 13 }}>
            💡 Hint — {current.hint}
          </p>
        )}
      </div>

      {/* Options */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {current.options.map((option, i) => {
          const isCorrect = option === current.correct;
          const isSelected = option === selected;
          let bg = COLORS.card;
          let borderColor = COLORS.border;
          let textColor = COLORS.text;

          if (showResult) {
            if (isCorrect) {
              bg = COLORS.correctBg;
              borderColor = COLORS.correct;
              textColor = COLORS.correct;
            } else if (isSelected && !isCorrect) {
              bg = COLORS.wrongBg;
              borderColor = COLORS.wrong;
              textColor = COLORS.wrong;
            }
          }

          return (
            <button
              key={i}
              onClick={() => handleSelect(option)}
              style={{
                background: bg,
                border: `2px solid ${borderColor}`,
                borderRadius: 12,
                padding: "14px 18px",
                fontSize: 16,
                color: textColor,
                cursor: selected ? "default" : "pointer",
                textAlign: "left",
                fontWeight: isSelected || (showResult && isCorrect) ? 600 : 400,
                transition: "all 0.2s",
                display: "flex",
                alignItems: "center",
                gap: 10,
              }}
            >
              <span
                style={{
                  width: 28,
                  height: 28,
                  borderRadius: 14,
                  background: showResult && isCorrect ? COLORS.correct : showResult && isSelected ? COLORS.wrong : COLORS.primaryFaint,
                  color: showResult && (isCorrect || isSelected) ? "white" : COLORS.primary,
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  fontSize: 13,
                  fontWeight: 600,
                  flexShrink: 0,
                }}
              >
                {showResult && isCorrect ? "✓" : showResult && isSelected ? "✗" : String.fromCharCode(65 + i)}
              </span>
              {option}
            </button>
          );
        })}
      </div>

      {/* Explanation */}
      {showResult && (
        <div
          style={{
            background: selected === current.correct ? COLORS.correctBg : COLORS.wrongBg,
            borderRadius: 12,
            padding: "14px 18px",
            marginTop: 16,
            fontSize: 14,
            lineHeight: 1.5,
            color: COLORS.text,
          }}
        >
          <strong>{selected === current.correct ? "Muito bem! ✨" : "Not quite! 🤔"}</strong>
          <br />
          {current.explanation}
        </div>
      )}

      {showResult && (
        <button
          onClick={handleNext}
          style={{
            width: "100%",
            background: COLORS.primary,
            color: "white",
            border: "none",
            borderRadius: 12,
            padding: "14px",
            fontSize: 16,
            fontWeight: 600,
            cursor: "pointer",
            marginTop: 16,
          }}
        >
          {currentIdx < challenges.length - 1 ? "Next Question →" : "See Results 🎉"}
        </button>
      )}
    </div>
  );
}

function PatternGuide({ onBack }) {
  const patterns = [
    {
      title: "The H ↔ F Swap",
      spanish: "hablar, hacer, hijo, hilo",
      portuguese: "falar, fazer, filho, fio",
      rule: "Spanish 'h' (silent) often becomes Portuguese 'f'. This is one of the most reliable patterns!",
    },
    {
      title: "The UE → O Rule",
      spanish: "puerta, cuenta, bueno, fuerte",
      portuguese: "porta, conta, bom, forte",
      rule: "Spanish 'ue' diphthong simplifies to 'o' in Portuguese. Works almost every time.",
    },
    {
      title: "The IE → E Rule",
      spanish: "fiesta, tierra, bien, tiene",
      portuguese: "festa, terra, bem, tem",
      rule: "Spanish 'ie' diphthong simplifies to 'e' in Portuguese.",
    },
    {
      title: "The LL → LH Swap",
      spanish: "calle, caballo, ella, llamar",
      portuguese: "rua*, cavalo*, ela, chamar",
      rule: "Spanish 'll' often becomes 'lh' in Portuguese (both ≈ 'ly' sound), though some words diverge entirely (*rua, *cavalo).",
    },
    {
      title: "The Ñ → NH Swap",
      spanish: "España, señor, año, niño",
      portuguese: "Espanha, senhor, ano, menino*",
      rule: "Spanish 'ñ' = Portuguese 'nh'. Same sound, different spelling! (*some words change more)",
    },
    {
      title: "The -CIÓN → -ÇÃO Swap",
      spanish: "nación, estación, información",
      portuguese: "nação, estação, informação",
      rule: "All those Spanish '-ción' words become '-ção' in Portuguese. Thousands of instant cognates!",
    },
    {
      title: "The -DAD → -DADE Swap",
      spanish: "ciudad, universidad, verdad",
      portuguese: "cidade, universidade, verdade",
      rule: "Spanish '-dad' endings become '-dade' in Portuguese. Add an 'e' and you're there!",
    },
  ];

  return (
    <div>
      <button
        onClick={onBack}
        style={{
          background: "none",
          border: "none",
          color: COLORS.primary,
          fontSize: 15,
          cursor: "pointer",
          padding: "8px 0",
          marginBottom: 12,
          fontWeight: 500,
        }}
      >
        ← Back
      </button>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontSize: 40, marginBottom: 4 }}>🔑</div>
        <h2 style={{ margin: 0, color: COLORS.text, fontSize: 24 }}>Spanish → Portuguese</h2>
        <p style={{ margin: "4px 0 0", color: COLORS.textLight, fontSize: 14 }}>
          Your secret weapon: predictable patterns between the two languages
        </p>
      </div>
      {patterns.map((p, i) => (
        <div
          key={i}
          style={{
            background: COLORS.card,
            borderRadius: 14,
            padding: "18px 20px",
            marginBottom: 12,
            border: `1px solid ${COLORS.border}`,
          }}
        >
          <h3 style={{ margin: "0 0 10px", color: COLORS.primary, fontSize: 17 }}>{p.title}</h3>
          <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
            <div
              style={{
                flex: 1,
                minWidth: 140,
                background: COLORS.spanishBg,
                borderRadius: 8,
                padding: "8px 12px",
              }}
            >
              <div style={{ fontSize: 11, color: COLORS.spanish, fontWeight: 600, marginBottom: 2 }}>
                🇪🇸 SPANISH
              </div>
              <div style={{ fontSize: 14, color: COLORS.text }}>{p.spanish}</div>
            </div>
            <div
              style={{
                flex: 1,
                minWidth: 140,
                background: COLORS.primaryFaint,
                borderRadius: 8,
                padding: "8px 12px",
              }}
            >
              <div style={{ fontSize: 11, color: COLORS.primary, fontWeight: 600, marginBottom: 2 }}>
                🇵🇹 PORTUGUESE
              </div>
              <div style={{ fontSize: 14, color: COLORS.text }}>{p.portuguese}</div>
            </div>
          </div>
          <div style={{ fontSize: 13, color: COLORS.textLight, lineHeight: 1.5 }}>
            {p.rule}
          </div>
        </div>
      ))}
    </div>
  );
}

function PortugueseLearner() {
  const [view, setView] = useState("home"); // home, lesson, challenge, patterns
  const [selectedLesson, setSelectedLesson] = useState(null);
  const [completedLessons, setCompletedLessons] = useState({});
  const [challengesDone, setChallengesDone] = useState(0);

  const openLesson = (lesson) => {
    setSelectedLesson(lesson);
    setView("lesson");
    setCompletedLessons((prev) => ({ ...prev, [lesson.id]: true }));
  };

  if (view === "lesson" && selectedLesson) {
    return (
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "20px 16px", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif" }}>
        <LessonView lesson={selectedLesson} onBack={() => setView("home")} />
      </div>
    );
  }

  if (view === "challenge") {
    return (
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "20px 16px", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif" }}>
        <ChallengeView
          onBack={() => {
            setView("home");
            setChallengesDone((d) => d + 1);
          }}
        />
      </div>
    );
  }

  if (view === "patterns") {
    return (
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "20px 16px", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif" }}>
        <PatternGuide onBack={() => setView("home")} />
      </div>
    );
  }

  // ─── Home Screen ───────────────────────────────────────────────────────────
  const progress = Object.keys(completedLessons).length;

  return (
    <div
      style={{
        maxWidth: 520,
        margin: "0 auto",
        padding: "20px 16px",
        fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
        color: COLORS.text,
      }}
    >
      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <div style={{ fontSize: 18, marginBottom: 4 }}>🇵🇹</div>
        <h1 style={{ margin: "0 0 4px", fontSize: 26, color: COLORS.primary, fontWeight: 700 }}>
          Aprende Português
        </h1>
        <p style={{ margin: 0, color: COLORS.textLight, fontSize: 14 }}>
          Holiday Portuguese for Spanish & English speakers
        </p>
      </div>

      {/* Progress */}
      <div
        style={{
          background: COLORS.card,
          borderRadius: 14,
          padding: "16px 20px",
          marginBottom: 20,
          border: `1px solid ${COLORS.border}`,
          display: "flex",
          justifyContent: "space-around",
          textAlign: "center",
        }}
      >
        <div>
          <div style={{ fontSize: 24, fontWeight: 700, color: COLORS.primary }}>{progress}</div>
          <div style={{ fontSize: 12, color: COLORS.textLight }}>Lessons done</div>
        </div>
        <div style={{ width: 1, background: COLORS.border }} />
        <div>
          <div style={{ fontSize: 24, fontWeight: 700, color: COLORS.accent }}>{challengesDone}</div>
          <div style={{ fontSize: 12, color: COLORS.textLight }}>Challenges</div>
        </div>
        <div style={{ width: 1, background: COLORS.border }} />
        <div>
          <div style={{ fontSize: 24, fontWeight: 700, color: COLORS.spanish }}>
            {LESSONS.reduce((acc, l) => acc + l.phrases.length, 0)}
          </div>
          <div style={{ fontSize: 12, color: COLORS.textLight }}>Total phrases</div>
        </div>
      </div>

      {/* Daily Challenge CTA */}
      <button
        onClick={() => setView("challenge")}
        style={{
          width: "100%",
          background: `linear-gradient(135deg, ${COLORS.primary}, #1b4332)`,
          color: "white",
          border: "none",
          borderRadius: 14,
          padding: "20px",
          marginBottom: 12,
          cursor: "pointer",
          textAlign: "left",
        }}
      >
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>
              Daily Challenge 🎯
            </div>
            <div style={{ fontSize: 13, opacity: 0.85 }}>
              5 random questions · test your Portuguese!
            </div>
          </div>
          <div style={{ fontSize: 28 }}>→</div>
        </div>
      </button>

      {/* Spanish Patterns shortcut */}
      <button
        onClick={() => setView("patterns")}
        style={{
          width: "100%",
          background: COLORS.spanishBg,
          color: COLORS.spanish,
          border: `1px solid #ddd6fe`,
          borderRadius: 14,
          padding: "16px 20px",
          marginBottom: 24,
          cursor: "pointer",
          textAlign: "left",
          display: "flex",
          justifyContent: "space-between",

      >

          <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 2 }}>

          </div>

          </div>

      {/* Lesson Grid */}
      <h2 style={{ fontSize: 18, fontWeight: 600, marginBottom: 14 }}>Lessons</h2>

          <button

              gap: 14,
              transition: "box-shadow 0.2s",

              style={{
                width: 48,

              {lesson.icon}

              <div style={{ fontSize: 16, fontWeight: 600, color: COLORS.text }}>{lesson.title}</div>
              <div style={{ fontSize: 13, color: COLORS.textLight }}>
                {lesson.subtitle} · {lesson.phrases.length} phrases
              </div>
            </div>
            {completedLessons[lesson.id] && (
              <span style={{ color: COLORS.correct, fontSize: 18 }}>✓</span>

          </button>

      </div>

      {/* Footer tip */}
      <div
        style={{
          textAlign: "center",
          marginTop: 28,
          padding: "16px",
          background: COLORS.accentLight,
          borderRadius: 12,
          fontSize: 13,
          color: COLORS.text,
          lineHeight: 1.5,
        }}
      >
        <strong>Dica do dia:</strong> Portuguese and Spanish share about 89% of their vocabulary.
        With your Spanish, you already understand far more Portuguese than you think!
      </div>
    </div>
  );
}

  </script>
